<div id="move-notification">
  <div class="alert alert-error" style="display:flex;align-items:center;justify-content:space-between;gap:1rem">
    <span>{{ error }}</span>
    <button type="button" style="background:none;border:none;cursor:pointer;font-size:1rem;color:var(--accent);padding:0"
            onclick="document.getElementById('move-notification').innerHTML=''">✕</button>
  </div>
</div>
